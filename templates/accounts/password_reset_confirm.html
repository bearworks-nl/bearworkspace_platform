{% extends "base.html" %}
{% block unauthenticated_content %}
<div class="min-h-screen bg-gray-50 dark:bg-gray-950 flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="w-12 h-12 rounded-2xl flex items-center justify-center font-bold text-xl text-white mx-auto mb-4" style="background:var(--a600);">D</div>
      <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100">Set new password</h1>
    </div>
    <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm p-8">
      <form method="post">{% csrf_token %}
        {% include "partials/field.html" with field=form.password1 %}
        {% include "partials/field.html" with field=form.password2 %}
        <button type="submit" class="w-full py-2.5 text-sm font-semibold text-white rounded-lg mt-1" style="background:var(--a600);" onmouseover="this.style.background='var(--a700)'" onmouseout="this.style.background='var(--a600)'">Update password</button>
      </form>
    </div>
  </div>
</div>
<script>
  function applyTheme(t){document.getElementById('html-root').classList.toggle('dark',t==='dark'||(t==='system'&&window.matchMedia('(prefers-color-scheme: dark)').matches));}
  applyTheme(localStorage.getItem('theme')||'system');
  try{const s=localStorage.getItem('accent');if(s){const p=JSON.parse(s);document.documentElement.style.setProperty('--a600',p.a600);document.documentElement.style.setProperty('--a700',p.a700);}}catch(e){}
</script>
{% endblock %}
