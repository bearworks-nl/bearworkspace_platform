<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — WorkspaceManager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --accent: #6366f1; --accent-light: #818cf8; }
    [data-theme="dark"] { --bg-base:#0d0f14; --bg-surface:#13161e; --bg-raised:#1a1e2a; --border:rgba(255,255,255,0.07); --border-strong:rgba(255,255,255,0.13); --text-primary:#f0f2f8; --text-secondary:#8b91a8; --text-muted:#555c72; }
    [data-theme="light"] { --bg-base:#f4f6fb; --bg-surface:#ffffff; --bg-raised:#eef0f7; --border:rgba(0,0,0,0.07); --border-strong:rgba(0,0,0,0.13); --text-primary:#0f1120; --text-secondary:#4b5263; --text-muted:#9ba3b5; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-base); color: var(--text-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .auth-card { width: 100%; max-width: 400px; background: var(--bg-surface); border: 1px solid var(--border-strong); border-radius: 20px; padding: 36px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
    .form-input { width: 100%; background: var(--bg-raised); border: 1px solid var(--border-strong); border-radius: 9px; padding: 11px 14px; color: var(--text-primary); font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s; }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text-muted); }
    .btn-submit { width: 100%; padding: 12px; border-radius: 9px; background: var(--accent); color: white; font-size: 15px; font-weight: 700; font-family: inherit; border: none; cursor: pointer; margin-top: 16px; transition: all 0.15s; }
    .btn-submit:hover { background: var(--accent-light); }
  </style>
</head>
<body>
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="width:48px;height:48px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:white;margin:0 auto 12px;">W</div>
      <div style="font-size:22px;font-weight:800;">Reset your password</div>
      <div style="font-size:13.5px;color:var(--text-muted);margin-top:6px;">Enter your email and we'll send a reset link</div>
    </div>
    <form method="post" action="{% url 'accounts:password_reset' %}">
      {% csrf_token %}
      <div style="margin-bottom:16px;">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-input" placeholder="you@company.com" required>
      </div>
      <button type="submit" class="btn-submit">Send reset link</button>
    </form>
    <div style="text-align:center;margin-top:16px;font-size:13.5px;color:var(--text-muted);">
      <a href="{% url 'accounts:login' %}" style="color:var(--accent-light);text-decoration:none;font-weight:600;">← Back to sign in</a>
    </div>
  </div>
  <script>
    const t = localStorage.getItem('wm_theme') || 'dark';
    const r = t === 'system' ? (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light') : t;
    document.documentElement.setAttribute('data-theme', r);
  </script>
</body>
</html>
