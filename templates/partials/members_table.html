<div id="members-table">
  <table class="w-full text-sm">
    <thead><tr class="border-b border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-800/50">
      <th class="text-left py-3 px-6 text-xs font-bold uppercase tracking-widest text-gray-400">User</th>
      <th class="text-left py-3 px-6 text-xs font-bold uppercase tracking-widest text-gray-400">Role</th>
      <th class="py-3 px-6 w-20"></th>
    </tr></thead>
    <tbody class="divide-y divide-gray-50 dark:divide-gray-800">
      {% for m in memberships %}
      <tr class="hover:bg-gray-50 dark:hover:bg-gray-800/40 transition-colors">
        <td class="py-3 px-6"><p class="font-semibold text-gray-900 dark:text-gray-100">{{ m.user.full_name }}</p><p class="text-xs text-gray-400">{{ m.user.email }}</p></td>
        <td class="py-3 px-6"><span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-blue-50 text-blue-700 dark:bg-blue-900/20 dark:text-blue-400"><span class="w-1.5 h-1.5 rounded-full bg-current"></span>{{ m.get_role_display }}</span></td>
        <td class="py-3 px-6 text-right">
          <form method="post" action="{% url 'organisations:remove_member' org.pk m.pk %}"
            hx-post="{% url 'organisations:remove_member' org.pk m.pk %}" hx-target="#members-table" hx-swap="outerHTML">
            {% csrf_token %}
            <button type="submit" class="text-xs font-semibold text-red-500 hover:text-red-700 hover:underline transition-colors">Remove</button>
          </form>
        </td>
      </tr>
      {% empty %}<tr><td colspan="3" class="py-10 text-center text-sm text-gray-400">No members yet.</td></tr>{% endfor %}
    </tbody>
  </table>
</div>
