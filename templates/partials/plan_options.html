<label class="block text-xs font-bold uppercase tracking-widest text-gray-600 dark:text-gray-400 mb-1.5">Billing plan <span class="text-red-500">*</span></label>
<select name="plan" class="w-full px-3 py-2 text-sm bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 transition-colors appearance-none">
  <option value="">— select a plan —</option>
  {% for plan in plans %}
    <option value="{{ plan.pk }}">{{ plan.name }} — {{ plan.currency }} {{ plan.price_per_unit }}/{{ plan.get_unit_type_display }}{% if plan.included_units %} ({{ plan.included_units }} free){% endif %}</option>
  {% empty %}
    <option disabled value="">No active plans for this product type</option>
  {% endfor %}
</select>
{% if not plans and selected_type %}
<p class="mt-1 text-xs text-amber-500">No active plans for this type. <a href="{% url 'billing:plan_create' %}" class="font-semibold hover:underline" style="color:var(--a600);">Create one</a></p>
{% endif %}
